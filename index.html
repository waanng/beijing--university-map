<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>北京高校探访筛选与对比</title>
  <meta name="theme-color" content="#174c3c" />
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <p>北京高校地理信息图</p>
        <h1>探访筛选与对比</h1>
      </div>
      <div class="summary-strip" aria-label="数据概览">
        <div>
          <span>学校</span>
          <strong id="totalCount">32</strong>
        </div>
        <div>
          <span>最低投档分</span>
          <strong>550+</strong>
        </div>
        <div>
          <span>数据年份</span>
          <strong>2025</strong>
        </div>
      </div>
    </header>

    <section class="workspace">
      <aside class="panel filters-panel">
        <section class="control-group">
          <label class="label" for="searchInput">搜索学校或专业方向</label>
          <input id="searchInput" class="search" type="search" placeholder="如：北航、法学、计算机" />
        </section>

        <section class="control-group">
          <div class="row-label">
            <span class="label">最低投档分</span>
            <strong id="scoreLabel">560+</strong>
          </div>
          <input id="scoreRange" class="range" type="range" min="560" max="690" step="5" value="560" />
        </section>

        <section class="control-group">
          <p class="label">兴趣方向</p>
          <div id="interestChips" class="chip-grid"></div>
        </section>

        <section class="control-group">
          <p class="label">探访区域</p>
          <div id="areaChips" class="chip-grid"></div>
        </section>

        <div class="action-row">
          <button id="recommendButton" class="primary-button" type="button">推荐优先探访</button>
          <button id="clearButton" class="ghost-button" type="button">清空关注</button>
        </div>

        <p class="hint">先按分数、兴趣方向和区域缩小范围，再把学校加入关注清单。右侧会从分数段、区域分布和专业方向帮助比较。</p>
      </aside>

      <section class="map-panel">
        <div id="map"></div>
        <div class="map-overlay">
          <h2>把分数、专业和区位放在一张地图上</h2>
          <p>点击地图点位或学校卡片，查看校园照片、投档分和优势专业；用筛选与关注清单比较哪些学校更值得安排实地探访。</p>
        </div>
        <div id="mapBadge" class="map-badge">正在加载高校数据</div>
      </section>

      <aside class="panel detail-panel">
        <section id="schoolDetail" class="school-detail"></section>
        <section class="compare-section">
          <div class="compare-head">
            <div>
              <p class="label">对比视图</p>
              <h2 id="compareTitle">筛选结果概览</h2>
            </div>
            <span id="compareCount" class="distance-pill">0 所</span>
          </div>
          <div id="metricGrid" class="metric-grid"></div>
          <div id="compareBars" class="compare-bars"></div>
          <div id="watchList" class="watch-list"></div>
          <div class="table-wrap">
            <table class="compare-table">
              <thead>
                <tr>
                  <th>学校</th>
                  <th>最低分</th>
                  <th>最高分</th>
                  <th>方向</th>
                  <th>区域</th>
                </tr>
              </thead>
              <tbody id="compareTable"></tbody>
            </table>
          </div>
        </section>
      </aside>
    </section>

    <section class="school-drawer">
      <div class="drawer-head">
        <div>
          <p class="label">学校清单</p>
          <h2 id="resultTitle">全部学校</h2>
        </div>
        <button id="fitButton" class="ghost-button" type="button">查看全部点位</button>
      </div>
      <div id="schoolGrid" class="school-grid"></div>
    </section>
  </main>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="data/universities.js"></script>
  <script src="app.js"></script>
</body>
</html>
